# Render Blueprint — one Docker web service for the Video Engine app.
# In Render: New → Blueprint → pick this repo, and it reads this file.
services:
  - type: web
    name: video-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free             # free = no card needed, but 512MB/0.1CPU can OOM on 1080x1920 renders.
                           # Upgrade to `starter` (paid) in the dashboard if renders fail.
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PEXELS_API_KEY
        sync: false        # set the value in the Render dashboard (kept out of git)
